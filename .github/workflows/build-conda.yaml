name: Build and deploy GRASS conda packages

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - grass-8.4.2/**
      - grass-8.5.0/**
      - grass-dev/**
      - .github/workflows/build-conda.yaml
  pull_request:
    paths:
      - grass-8.4.2/**
      - grass-8.5.0/**
      - grass-dev/**
      - .github/workflows/build-conda.yaml
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # daily at 00:00 UTC

jobs:
  build:
    name: Build ${{ matrix.package }} (${{ matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, macos-15-intel, windows-latest ]
        python: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]
        package:
          - grass-8.4.2
          - grass-8.5.0
          - grass-dev
        exclude:
          - os: windows-latest
            package: grass-8.4.2
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          micromamba-version: latest
          environment-name: build
          create-args: conda-build
          cache-environment: true
          cache-downloads: true

      - name: Check whether package already exists
        id: check_package
        if: ${{ matrix.package != 'grass-dev' }}
        shell: bash
        run: |
          set -euo pipefail

          case "${{ matrix.os }}" in
            ubuntu-latest) subdir="linux-64";;
            macos-latest) subdir="osx-arm64";;
            macos-15-intel) subdir="osx-64";;
            windows-latest) subdir="win-64";;
            *) echo "Unknown platform"; exit 1;;
          esac

          build_number=$(
            grep -E '^[[:space:]]*number:[[:space:]]*[0-9]+' \
              "${{ matrix.package }}/meta.yaml" \
            | sed -E 's/.*number:[[:space:]]*([0-9]+).*/\1/' \
            | head -n1
          )
          build_number="${build_number:-0}"

          py_tag="py${{ matrix.python }}"
          py_tag="${py_tag//./}"

          channel_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          repodata_url="${channel_url}/${subdir}/repodata.json"

          echo "Checking ${repodata_url}"
          exists=false
          if curl -fsSL "$repodata_url" -o repodata.json; then
            pattern="^${{ matrix.package }}-${py_tag}.*_${build_number}\\.conda$"
            if jq -r '.["packages.conda"] | keys[]?' repodata.json \
                | grep -Eq "$pattern"; then
              exists=true
            fi
          fi

          echo "exists=${exists}" >> "$GITHUB_OUTPUT"
          echo "exists=${exists}"

      - name: Build ${{ matrix.package }} package
        id: build_package
        if: ${{ matrix.package == 'grass-dev' || steps.check_package.outputs.exists != 'true' }}
        shell: bash
        run: |
          micromamba run -n build conda build ${{ matrix.package }} -c conda-forge \
            --output-folder ${{ matrix.package }}-conda \
            --variants "{python: ['${{ matrix.python }}']}"

      - name: Upload ${{ matrix.package }} artifact
        if: ${{ always() && steps.build_package.outcome == 'success' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.package }}-conda-${{ matrix.os }}-py${{ matrix.python }}
          path: ${{ matrix.package }}-conda

  package:
    name: Package conda artifacts
    needs: build
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore existing channel
        shell: bash
        run: |
          set -euo pipefail

          CHANNEL_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          mkdir -p grass-conda

          for subdir in linux-64 osx-64 osx-arm64 win-64; do
            repodata_url="${CHANNEL_URL}/${subdir}/repodata.json"

            if ! curl -fsSL "$repodata_url" -o repodata.json; then
              echo "No existing repodata for ${subdir}; skipping."
              continue
            fi

            mkdir -p "grass-conda/${subdir}"

            jq -r '.["packages.conda"] | keys[]?' repodata.json | while read -r filename; do
              echo "Downloading ${subdir}/${filename}"
              curl -fsSL "${CHANNEL_URL}/${subdir}/${filename}" \
                -o "grass-conda/${subdir}/${filename}"
            done
          done

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          micromamba-version: latest
          environment-name: index
          create-args: conda-index
          cache-environment: true
          cache-downloads: true

      - name: Download new conda artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Assemble conda channel layout
        shell: bash
        run: |
          for d in artifacts/*-conda-*; do
            echo "Merging $d"
            rsync -a $d/ grass-conda/
          done

          find grass-conda -print | sort

      - name: Index conda channel
        shell: bash
        run: |
          micromamba run -n index conda index grass-conda
          python .github/workflows/scripts/make_root.py grass-conda

      - name: Upload channel artifact
        uses: actions/upload-artifact@v6
        with:
          name: channel
          path: grass-conda

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: grass-conda

  deploy:
    name: Deploy conda packages
    needs: package
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Deploy conda packages
        id: deployment
        uses: actions/deploy-pages@v4
