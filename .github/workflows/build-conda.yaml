name: Build and deploy GRASS conda packages

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
    paths:
      - grass-8.4.2/**
      - grass-8.5.0/**
      - grass-dev/**
      - .github/workflows/build-conda.yaml
  pull_request:
    paths:
      - grass-8.4.2/**
      - grass-8.5.0/**
      - grass-dev/**
      - .github/workflows/build-conda.yaml
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # daily at 00:00 UTC

jobs:
  build:
    name: Build ${{ matrix.package }} (${{ matrix.os }}, py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, macos-15-intel, windows-latest ]
        python: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]
        package:
          - grass-8.4.2
          - grass-8.5.0
          - grass-dev
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          micromamba-version: latest
          environment-name: build
          create-args: >-
            conda-build
          cache-environment: true
          cache-downloads: true

      - name: Show micromamba environment
        shell: bash
        run: |
          micromamba info
          micromamba list

      - name: Configure micromamba
        shell: bash
        run: |
          micromamba run -n build conda config --set channel_priority strict
          micromamba run -n build conda config --add channels conda-forge

      - name: Build ${{ matrix.package }} package
        id: build_package
        shell: bash
        run: |
          micromamba run -n build conda build ${{ matrix.package }} -c conda-forge \
            --output-folder ${{ matrix.package }}-conda \
            --variants "{python: ['${{ matrix.python }}']}"

      - name: Upload ${{ matrix.package }} artifact
        if: ${{ always() && steps.build_package.outcome == 'success' }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.package }}-conda-${{ matrix.os }}-py${{ matrix.python }}
          path: ${{ matrix.package }}-conda

  package:
    name: Package conda artifacts
    needs: build
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up micromamba
        uses: mamba-org/setup-micromamba@v3
        with:
          micromamba-version: latest
          environment-name: index
          create-args: >-
            conda-index
          cache-environment: true
          cache-downloads: true

      - name: Show micromamba environment
        shell: bash
        run: |
          micromamba info
          micromamba list

      - name: Download conda artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Assemble conda channel layout
        shell: bash
        run: |
          mkdir -p grass-conda
          for d in artifacts/*-conda-*; do
            echo "Merging $d"
            rsync -a $d/ grass-conda/
          done
          find grass-conda -print | sort

      - name: Index conda channel
        shell: bash
        run: |
          micromamba run -n index conda index grass-conda
          python .github/workflows/scripts/make_root.py grass-conda

      - name: Upload channel artifact
        uses: actions/upload-artifact@v6
        with:
          name: channel
          path: grass-conda

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: grass-conda

  deploy:
    name: Deploy conda packages
    needs: package
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    if: ${{ always() && github.event_name != 'pull_request' && github.ref == 'refs/heads/main' }}

    steps:
      - name: Deploy conda packages
        id: deployment
        uses: actions/deploy-pages@v4
